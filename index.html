<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Test 💕</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffd6e7, #ffeef5);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* الخلفية المتحركة */
.bg span {
    position: absolute;
    display: block;
    width: 10px;
    height: 10px;
    background: white;
    opacity: 0.6;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-10px);
    }
    100% {
        transform: translateY(100vh);
    }
}

/* الكارد */
.container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    width: 300px;
}

h1 {
    color: #ff4d88;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#yes {
    background: #ff4d88;
    color: white;
}

#no {
    background: #ffc2d1;
    color: white;
    position: absolute;
}
</style>
</head>

<body>

<!-- الخلفية -->
<div class="bg" id="bg"></div>

<div class="container">
    <div class="card">
        <h1>Do you love me? 💕</h1>
        <button id="yes" onclick="yesClicked()">Yes</button>
        <button id="no" onmouseover="moveNo()">No</button>
    </div>
</div>

<script>
/* صنع الثلج/الورد */
for (let i = 0; i < 40; i++) {
    let span = document.createElement("span");
    span.style.left = Math.random() * window.innerWidth + "px";
    span.style.animationDuration = (3 + Math.random() * 5) + "s";
    span.style.opacity = Math.random();
    document.getElementById("bg").appendChild(span);
}

function yesClicked() {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px;">
            <h1 style="color:#ff4d88;">I knew it 💖</h1>
            <img src="https://media.tenor.com/6lH7JYwR3XAAAAAC/rose.gif" width="220">
            <p style="font-size:18px;">
            I knew you loved me all along… 🌸✨ <br>
            You can’t hide it anymore 😌💗 <br>
            You're mine now 💞
            </p>
        </div>
    `;
}

function moveNo() {
    let btn = document.getElementById("no");
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>

</body>
</html>
